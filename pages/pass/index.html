  <main class="relative z-10 flex-1 flex items-center justify-center px-6 py-8">
    <div class="w-full max-w-sm reveal">
      <p class="text-center text-sm mb-4" style="color:var(--gold-soft)">✓ Registered — show this at the entrance</p>

      <!-- PASS -->
      <div class="rounded-[1.8rem] overflow-hidden" style="background:#fff;box-shadow:0 40px 90px -30px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.5)">
        <div class="px-6 pt-7 pb-6 text-center" style="background:linear-gradient(135deg,var(--wine),var(--plum-800))">

          <h1 id="guestName" class="font-display text-2xl font-600 mt-1" style="color:var(--cream)">Guest</h1>
          <span id="guestRel" class="inline-block mt-2 text-xs font-700 px-3 py-1 rounded-full" style="background:var(--gold);color:#3a2410">Relation</span>
        </div>

        <div class="p-6 text-center">
          <canvas id="qr" width="220" height="220" class="mx-auto rounded-xl"></canvas>
          <p id="guestId" class="mt-3 text-xs font-700 tracking-widest" style="color:var(--muted)">ID</p>
        </div>

        <div class="px-6 pb-6 space-y-3 text-left">
          <div id="branchRow">
            <p class="text-xs font-700 tracking-wider" style="color:var(--muted)">CONNECTED THROUGH</p>
            <p id="guestBranch" class="text-sm font-600" style="color:var(--ink)">—</p>
          </div>
          <div id="familyRow">
            <p class="text-xs font-700 tracking-wider" style="color:var(--muted)">ARRIVING WITH</p>
            <div id="guestFamily" class="flex flex-wrap gap-1.5 mt-1"></div>
          </div>
        </div>
      </div>

      <div class="mt-6 flex gap-3">
        <a href="/dashboard" class="btn-glossy font-700 px-5 py-3 rounded-full flex-1 text-center">See VIP dashboard →</a>
        <a href="/register" class="btn-ghost font-700 px-5 py-3 rounded-full text-center">New guest</a>
      </div>
    </div>
  </main>

<script type="module">
  import { db } from '/js/firebase-config.js';
  import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const params  = new URLSearchParams(window.location.search);
  const eventId = params.get('event');
  const guestId = params.get('g');

  (async function init() {
    let me = null;

    // 1. Try sessionStorage first (fastest — set immediately after registration)
    if (guestId) {
      const cached = sessionStorage.getItem('rqr_pass_' + guestId);
      if (cached) me = JSON.parse(cached);
    }

    // 2. Fallback: Firestore (for bookmarks / revisits)
    if (!me && eventId && guestId) {
      try {
        const snap = await getDoc(doc(db, 'events', eventId, 'guests', guestId));
        if (snap.exists()) me = { ...snap.data(), id: snap.id };
      } catch(err) {
        console.error('Failed to load pass from Firestore:', err);
      }
    }

    if (!me) {
      const regUrl = eventId ? `/register?event=${eventId}` : '/register';
      document.querySelector('main .w-full').innerHTML = `
        <div class="card p-8 text-center">
          <h1 class="font-display text-xl font-600" style="color:var(--plum-900)">No pass found</h1>
          <p class="mt-2 text-sm" style="color:var(--muted)">Register first to generate your QR pass.</p>
          <a href="${regUrl}" class="btn-gold inline-block font-700 px-6 py-3 rounded-full mt-5">Go to register</a>
        </div>`;
      return;
    }

    // Populate pass fields
    document.getElementById('guestName').textContent = me.name;
    document.getElementById('guestRel').textContent  = me.relationType;
    // Use a friendly short ID: first 8 chars of Firestore doc ID (uppercase)
    const shortId = me.id.slice(0, 8).toUpperCase();
    document.getElementById('guestId').textContent = 'PASS ID · ' + shortId;

    const branch = document.getElementById('guestBranch');
    if (me.branch) {
      branch.textContent = me.branch;
    } else {
      document.getElementById('branchRow').style.display = 'none';
    }

    const fam = document.getElementById('guestFamily');
    if (me.family && me.family.length) {
      me.family.forEach(f => {
        const s = document.createElement('span');
        s.className = 'text-xs px-2 py-1 rounded-md';
        s.style.cssText = 'background:var(--blush);color:var(--wine)';
        s.textContent = (f.rel ? f.rel + ' · ' : '') + f.name;
        fam.appendChild(s);
      });
    } else {
      document.getElementById('familyRow').style.display = 'none';
    }

    // QR encodes the guest pass ID so staff can scan it at the door
    drawQR('qr', shortId + '|' + me.name);
  })();

  // Deterministic decorative QR-style matrix
  function drawQR(id, seedStr) {
    const c = document.getElementById(id), ctx = c.getContext('2d');
    const N = 21, cell = c.width / N;
    let h = 2166136261;
    for (let i = 0; i < seedStr.length; i++) { h ^= seedStr.charCodeAt(i); h = Math.imul(h, 16777619); }
    const rand = () => { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; return ((h >>> 0) % 1000) / 1000; };

    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#1d0b1f';
    const finder = (ox, oy) => {
      for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
        const edge = x === 0 || x === 6 || y === 0 || y === 6;
        const core = x >= 2 && x <= 4 && y >= 2 && y <= 4;
        if (edge || core) ctx.fillRect((ox + x) * cell, (oy + y) * cell, cell, cell);
      }
    };
    for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
      const inFinder = (x < 8 && y < 8) || (x > N - 9 && y < 8) || (x < 8 && y > N - 9);
      if (inFinder) continue;
      if (rand() > 0.5) ctx.fillRect(x * cell, y * cell, cell, cell);
    }
    finder(0, 0); finder(N - 7, 0); finder(0, N - 7);
  }
</script>
